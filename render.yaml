services:
  # FastAPI Backend
  - type: web
    name: radar-educativo-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: radar-edu-db
          property: connectionString
    healthCheckPath: /health

  # React Frontend (static site)
  - type: web
    name: radar-educativo-web
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: web/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://radar-educativo-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: radar-edu-db
    plan: free
    databaseName: radar_edu
