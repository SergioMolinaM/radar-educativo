version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: radar_edu
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/schemas:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d radar_edu"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://radar:${DB_PASSWORD:-changeme}@db:5432/radar_edu
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-prod}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../data:/app/data

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
